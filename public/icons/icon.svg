<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2126"/>
      <stop offset="100%" stop-color="#0f1216"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0.15" y1="0.1" x2="0.9" y2="0.95">
      <stop offset="0%" stop-color="#eab06d"/>
      <stop offset="55%" stop-color="#d98e4a"/>
      <stop offset="100%" stop-color="#bd7536"/>
    </linearGradient>
    <filter id="coinShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="9" stdDeviation="13" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <circle cx="256" cy="256" r="170" fill="url(#coinGrad)" filter="url(#coinShadow)"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#8f5a26" stroke-width="2" opacity="0.55"/>

  <!-- milled coin edge, doubles as a nod to receipt perforation -->
  <g fill="#8f5a26" opacity="0.45">
    <circle cx="406.0" cy="256.0" r="4.2"/>
    <circle cx="398.7" cy="302.4" r="4.2"/>
    <circle cx="377.4" cy="344.2" r="4.2"/>
    <circle cx="344.2" cy="377.4" r="4.2"/>
    <circle cx="302.4" cy="398.7" r="4.2"/>
    <circle cx="256.0" cy="406.0" r="4.2"/>
    <circle cx="209.6" cy="398.7" r="4.2"/>
    <circle cx="167.8" cy="377.4" r="4.2"/>
    <circle cx="134.6" cy="344.2" r="4.2"/>
    <circle cx="113.3" cy="302.4" r="4.2"/>
    <circle cx="106.0" cy="256.0" r="4.2"/>
    <circle cx="113.3" cy="209.6" r="4.2"/>
    <circle cx="134.6" cy="167.8" r="4.2"/>
    <circle cx="167.8" cy="134.6" r="4.2"/>
    <circle cx="209.6" cy="113.3" r="4.2"/>
    <circle cx="256.0" cy="106.0" r="4.2"/>
    <circle cx="302.4" cy="113.3" r="4.2"/>
    <circle cx="344.2" cy="134.6" r="4.2"/>
    <circle cx="377.4" cy="167.8" r="4.2"/>
    <circle cx="398.7" cy="209.6" r="4.2"/>
  </g>

  <!-- ascending bars: a quiet little growth chart -->
  <g fill="#1c1408">
    <rect x="200" y="252" width="28" height="64" rx="8"/>
    <rect x="242" y="220" width="28" height="96" rx="8"/>
    <rect x="284" y="188" width="28" height="128" rx="8"/>
  </g>
</svg>